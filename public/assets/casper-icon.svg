<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark background -->
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#242434"/>
      <stop offset="100%" stop-color="#10101a"/>
    </radialGradient>

    <!-- Ghost glow -->
    <radialGradient id="ghostGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#55eeff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#55eeff" stop-opacity="0"/>
    </radialGradient>

    <!-- Ghost body fill -->
    <linearGradient id="ghostBody" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#aaeeff"/>
      <stop offset="50%" stop-color="#66ccff"/>
      <stop offset="100%" stop-color="#3399ee"/>
    </linearGradient>

    <!-- Orbit ring gradient (blue → purple) -->
    <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00cfff"/>
      <stop offset="100%" stop-color="#a020f0"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00cfff"/>
      <stop offset="100%" stop-color="#a020f0"/>
    </linearGradient>
    <linearGradient id="ringGrad3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#00cfff"/>
      <stop offset="100%" stop-color="#a020f0"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="60" fill="url(#bg)"/>

  <!-- Ambient ghost glow blob -->
  <ellipse cx="256" cy="220" rx="110" ry="100" fill="url(#ghostGlow)"/>

  <!-- === ORBIT RINGS (drawn behind ghost) === -->

  <!-- Ring 1: tilted ~30° (blue-purple ellipse) -->
  <g filter="url(#glow)">
    <ellipse cx="256" cy="300" rx="150" ry="55"
      fill="none" stroke="url(#ringGrad1)" stroke-width="7"
      transform="rotate(-30 256 300)" opacity="0.95"/>
  </g>

  <!-- Ring 2: tilted ~-30° -->
  <g filter="url(#glow)">
    <ellipse cx="256" cy="300" rx="150" ry="55"
      fill="none" stroke="url(#ringGrad2)" stroke-width="7"
      transform="rotate(30 256 300)" opacity="0.95"/>
  </g>

  <!-- Ring 3: near-vertical -->
  <g filter="url(#glow)">
    <ellipse cx="256" cy="300" rx="55" ry="148"
      fill="none" stroke="url(#ringGrad3)" stroke-width="7"
      opacity="0.90"/>
  </g>

  <!-- Center dot of orbits -->
  <circle cx="256" cy="300" r="8" fill="#b060ff" filter="url(#strongGlow)"/>

  <!-- === GHOST BODY === -->
  <!-- Main rounded body -->
  <g filter="url(#softGlow)">
    <path d="
      M 256 130
      C 196 130 170 170 170 215
      C 170 255 170 270 170 285
      Q 170 310 185 310
      Q 200 310 210 295
      Q 220 280 230 295
      Q 240 310 256 310
      Q 272 310 282 295
      Q 292 280 302 295
      Q 312 310 327 310
      Q 342 310 342 285
      L 342 215
      C 342 170 316 130 256 130 Z
    " fill="url(#ghostBody)" opacity="0.95"/>
  </g>

  <!-- Ghost highlight (sheen) -->
  <ellipse cx="234" cy="178" rx="22" ry="28"
    fill="white" opacity="0.18" transform="rotate(-10 234 178)"/>

  <!-- Eyes -->
  <ellipse cx="232" cy="210" rx="16" ry="20" fill="#0a0a18" opacity="0.9"/>
  <ellipse cx="280" cy="210" rx="16" ry="20" fill="#0a0a18" opacity="0.9"/>

  <!-- Eye shine -->
  <ellipse cx="237" cy="204" rx="5" ry="6" fill="white" opacity="0.8"/>
  <ellipse cx="285" cy="204" rx="5" ry="6" fill="white" opacity="0.8"/>
</svg>

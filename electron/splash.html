<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Casper POS - Initializing</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            -webkit-app-region: drag;
        }

        .logo-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(0, 243, 255, 0.4));
        }

        .pulse-ring {
            border: 3px solid #00f3ff;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            animation: pulse-ring 2s cubic-bezier(0.24, 0, 0.38, 1) infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ffffff, #00f3ff, #ffffff);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        .status {
            font-size: 14px;
            color: #888;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .loader {
            margin-top: 20px;
            width: 160px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .loader-bar {
            width: 40%;
            height: 100%;
            background: #00f3ff;
            border-radius: 2px;
            animation: loading 1.5s ease-in-out infinite;
        }

        @keyframes loading {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(250%);
            }
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <div class="pulse-ring"></div>
        <img src="../public/assets/icon.png" class="logo" alt="Casper Logo">
    </div>
    <div class="title">CASPER ERP</div>
    <div class="status" id="status-text">Initializing Systems...</div>
    <div class="loader">
        <div class="loader-bar"></div>
    </div>

    <script>
        // Simple status update dummy
        const statuses = [
            "Initializing Systems...",
            "Connecting Database...",
            "Starting Web Server...",
            "Loading Modules..."
        ];
        let i = 0;
        setInterval(() => {
            i = (i + 1) % statuses.length;
            document.getElementById('status-text').innerText = statuses[i];
        }, 1200);
    </script>
</body>

</html>
